kind = "web"
previewPath = "/"
title = "The Estate Cafe"
version = "1.0.0"
id = "artifacts/estate-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20475

[services.development]
run = "pnpm --filter @workspace/estate-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/estate-cafe", "run", "build" ]
publicDir = "artifacts/estate-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20475"
BASE_PATH = "/"
